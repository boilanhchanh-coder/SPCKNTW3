<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>CINEMA</h1>
        <div class="login-box">
            <div class="select-role">
                <button class="select-button">
                    QUẢN TRỊ
                </button>
                <button class="select-button">KHÁCH HÀNG</button>
            </div>
            <div class="login">
                <label for="taikhoan">Tên đăng nhập</label>
                <input type="text" id="taikhoan" placeholder="Nhập tên đăng nhập">
                <label for="matkhau">Mật khẩu</label>
                <input type="password" id="matkhau" placeholder="Nhập mật khẩu">
                <button class="login-button">Đăng nhập</button>
                <a href="register.html">Chưa có tài khoản? Đăng kí</a>
            </div>

        </div>
    </div>
    <script src="data.js"></script>
</body>
</html>
