<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap');
    *{
        box-sizing: border-box;
    }
    body{
        font-family: 'Poppins', sans-serif;
        background-color:#0a0a09;
        color:#d6cdcd; 

    }
    .head{
        display: flex;
        justify-content:space-evenly;
        margin-top: 40px;
    }
    .logo{
        margin-right: 510px;
        font-family: 'Oswald', sans-serif;
        font-size: 40px;
        font-weight: bold;
    }
    .cine{
    color: white;
    }

    .hub{
        color: #e0743a;
    }
    .ttin{
        margin-right: 110px;
        font-size: small;
        color: #666;
    }
    .frames{
        display: flex;
        justify-content: space-between;
    }
   .dong-ke{
    width: 72%;
    height: 0.3px;
    border: none;
    background: #666;
    margin: 10px auto;
    }
    .register{
        width: 60%;
        height: 400px;
        margin-top: 50px;
        margin-right: 250px;
        margin-left: 70px;

    }
    .soc-doc{
    width: 1px;
    background: #444;
    height: 550px; 
    margin-top: 50px;
    }
    .login{
        width: 40%;
        height: 400px;
        margin-top: 50px;
        margin-left: 300px;
    }
    input{
        color:#666;
        background-color: black;
        border: 1px solid #666;
        border-radius: 3px;
        margin-bottom: 18px;
        width: 80%;
        height: 8%;
        padding-left: 10px;
    }
    
    label{
        display: block;
        margin-bottom: 5px;
    }
    .mk{
        display: flex;

    }
    .cot{
        width: 80%;
    }
    .cot input{
        width: 60%;
        height: 32px;;
    }  
    .mk input{
        width: 60%;
    }
    .button-login,
    .button-register{
        width: 80%;
        padding: 7px;
        background-color: transparent;
        border: 1px solid #e0743a;
        border-radius: 2px;
        cursor: pointer;
        font-size: 16px;
        color: #e0743a;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        transition: .2s;
    }
    .button-login:hover,
    .button-register:hover{
        background:#e0743a;
         color:#0a0a09; 
    }
    .button-login svg, .button-register svg { width:16px; height:16px; transition:transform .2s; }
    .button-login:hover svg, .button-register:hover svg { transform:translateX(4px); }
    .forget{
        margin-left: 250px;
        font-size: 12px;
        margin-top: 10px;
        color: #666;
        text-decoration: underline;
        cursor: pointer;
        
    }
</style>
<body>
<div class="container">
  <div class="head">
    <div class="logo">
    <div>
        <span class="cine">CINE</span><span class="hub">HUB</span>
    </div>
    </div>
    <div class="ttin">HỆ THỐNG QUẢN LÝ & ĐẶT VÉ<br>ĐĂNG NHẬP / ĐĂNG KÝ TÀI KHOẢN</div>
  </div>
  <hr class="dong-ke">
  <div class="frames">
 
    
    <div class="login">
        <h2>Đăng nhập</h2>
        <label>Tài khoản</label>
        <input type="text" id="loginUser" placeholder="Nhập tên đăng nhập">

        <label>Mật khẩu</label>
        <input type="password" id="loginPass" placeholder="Nhập mật khẩu">
        
        <button onclick="login()" class="button-login">
            ĐĂNG NHẬP →
        </button>
        <div class="forget">Quên mật khẩu</div>
    </div>
    <div class="soc-doc"></div>
    <div class="register">
      <h2>Đăng ký</h2>
      <label>Tài khoản</label>
        <input type="text" id="regUser" placeholder="Nhập tên đăng ký">
        
        <div class="mk">
            <div class="cot">
                <label>Mật khẩu</label>
                <input type="password" id="regPass" placeholder="Tối thiểu 8 ký tự">
            </div>
            <div class="cot">
                <label> Xác nhận </label>
                <input type="password" id="xac-nhan" placeholder="Nhập lại mật khẩu">
            </div>
        </div>
        
        <button onclick="register()" class="button-register">
        TẠO TÀI KHOẢN →
        </button>
    </div>
</body>
<script src="data.js"></script>
</html>
