<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <header class="topbar">
        <div class="logo">CINEMA</div>
        <div class="right">
            <div class="tim-kiem">
                <input type="text" class="search" placeholder="Tìm phim">
                <i class="fa-solid fa-magnifying-glass kinh-lup"></i>
            </div>
            <button class="myinfor">Hồ sơ</button>
        </div>
    </header><hr class="dong-ke">
    <section class="options">
        <button id="dangChieu" class="chon">ĐANG CHIẾU</button>
        <button id="sapChieu">SẮP CHIẾU</button>
    </section>
    <section class="listphim">
        <div class="overview" id="overview"></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');
    *{
    box-sizing: border-box;
    font-family: "Poppins",sans-serif;
    }
    body{
        background-color:#0a0a09;
        color:#d6cdcd; 
        height: 100%;
        margin: 0;
        padding: 0;
    }
    .topbar{
        width:100%;
        height:80px;
        background:#111;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 70px;
    }
    .logo{
        display: flex;
        margin-left: 50px;
        font-family: 'Oswald', sans-serif;
        font-size: 30px;
        font-weight: bold;
        color: white;
    }
    .right{
        display:flex;
        align-items:center;
        gap:15px;
    }
    .tim-kiem{
    position: relative;
    }

    .search{
        width:260px;
        height:42px;
        background:#1d1d1d;
        border:none;
        border-radius:10px;
        color:white;
        padding:0 45px 0 18px;
        outline:none;
    }

    .kinh-lup{
        position:absolute;
        right:15px;
        top:50%;
        transform:translateY(-50%);
        color:#888;
        font-size:16px;
        cursor:pointer;
        transition:.3s;
    }

    .kinh-lup:hover{
        color:#e0743a;
    }
    .myinfor{
        width:120px;
        height:42px;
        background:#e0743a;
        color:white;
        border-radius:10px;
        font-weight:600;
        border: none;
    }
    .dong-ke{
        width: 100%;
        height: 0.3px;
        border: none;
        background: #2b2a2a;
        margin: 10px auto;
    }
    .options{
        display: flex;
        width: 90%;
        gap: 25px;
        margin: 30px auto;
    }
    .options button{
        width: 180px;
        height: 50px;
        border-radius: 10px;
        border: none;
        background-color: #222;
        color: white;
    }
    .chon{
        background:#e0743a !important;
    }
    .listphim{
        width:90%;
        margin:auto;
        margin-bottom:80px;
    }
    .overview{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:35px;
        }
    .thephim{
        background:#1b1b1b;
        border-radius:12px;
        overflow:hidden;
        transition:.35s;
        box-shadow:0 8px 20px rgba(0,0,0,.4);
        display: flex;
        flex-direction: column;
    }
    .poster{
        position:relative;
        overflow:hidden;
    }
    .poster img{
        width: 100%;
        height:320px;
        object-fit:cover;
        transition:.5s;
    }
    .thephim h3{
        margin:18px 18px 10px;
        font-size:16px;
    }
    .thephim p{
        margin-left:12px;
        margin-right: 2px;
        margin-bottom:6px;
        color:#bdbdbd;
        font-size:14px;
    }
    .thephim:hover{
    transform:translateY(-10px);
    box-shadow:0 18px 40px rgba(224,116,58,.35);

}
    .rate{
        margin:10px 12px;
        color:#ffc107;
        font-size:18px;
    }
    .new{
        position:absolute;
        right:15px;
        top:15px;
        background:#2196f3;
        color:white;
        padding:6px 14px;
        border-radius:30px;
        font-size:12px;
        font-weight:bold;
    }
    .hot{
        background:#e53935;
    }
    .age{
        position:absolute;
        left:15px;
        top:15px;
        width:45px;
        height:45px;
        background:#e0743a;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        font-weight:bold;
    }
    .buy{
        display: flex;
        border: none;
        width: 80%;
        height:45px;
        margin:18px auto 20px;
        background:#e0743a;
        color:white;
        border-radius:8px;
        font-weight:700;
        justify-content: center;
        align-items: center;
        text-align: center;


        
        width:80%;
        height:45px;
        border:none;
        border-radius:8px;
        background:#e0743a;
        color:white;
        font-weight:700;
        margin-top:auto;
        margin-left:auto;
        margin-right:auto;
        margin-bottom:20px;
    }
    .buy:hover{
        background:#ff9258;
    }
    .thephim h3{
    margin:18px 18px 10px;
    font-size:16px;
    }

    .ten-phim{
        color:white;
        text-decoration:none;
    }

    .ten-phim:hover{
        text-decoration:underline;
        cursor:pointer;
    }
</style>
